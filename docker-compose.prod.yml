version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: mangazone_app
    ports:
      - "80:80"
    depends_on:
      - db
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "mysql://mangazone:${DB_PASSWORD}@db:3306/mangazone?serverVersion=8.0"
    volumes:
      - uploads:/var/www/html/public/uploads
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mangazone_db
    environment:
      MYSQL_DATABASE: mangazone
      MYSQL_USER: mangazone
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

volumes:
  db_data:
  uploads:
